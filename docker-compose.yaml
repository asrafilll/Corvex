name: monorepo-template

x-app: &app
  build:
    context: .
    target: app
  image: monorepo-template-app

x-server-environment: &server-environment
  NODE_ENV: "${NODE_ENV:-production}"
  API_PORT: "8000"
  BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}"
  BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://api.localhost}"
  CLIENT_ORIGINS: "${CLIENT_ORIGINS:-http://localhost,http://admin.localhost}"
  DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/monorepo_template?schema=public}"
  ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"
  REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
  S3_BUCKET: "${S3_BUCKET:-}"
  S3_ENDPOINT: "${S3_ENDPOINT:-}"
  S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
  S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:-}"
  S3_REGION: "${S3_REGION:-auto}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
  TELEMETRY_API_KEY: "${TELEMETRY_API_KEY:-}"
  TELEMETRY_API_KEY_HEADER: "${TELEMETRY_API_KEY_HEADER:-authorization}"
  TELEMETRY_EXPORTER: "${TELEMETRY_EXPORTER:-console}"
  TELEMETRY_EXPORTER_OTLP_ENDPOINT: "${TELEMETRY_EXPORTER_OTLP_ENDPOINT:-}"
  TELEMETRY_SERVICE_NAMESPACE: "${TELEMETRY_SERVICE_NAMESPACE:-monorepo-template}"

services:
  caddy:
    build:
      context: .
      target: caddy
      args:
        VITE_API_URL: "${VITE_API_URL:-http://api.localhost}"
    image: monorepo-template-caddy
    container_name: monorepo-template-caddy
    restart: unless-stopped
    environment:
      PLATFORM_SITE_ADDRESS: "${PLATFORM_SITE_ADDRESS:-http://localhost}"
      ADMIN_SITE_ADDRESS: "${ADMIN_SITE_ADDRESS:-http://admin.localhost}"
      API_SITE_ADDRESS: "${API_SITE_ADDRESS:-http://api.localhost}"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: monorepo-template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monorepo_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monorepo_template"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: monorepo-template-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *app
    container_name: monorepo-template-api
    restart: unless-stopped
    environment:
      <<: *server-environment
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: sh -c "pnpm db:deploy && pnpm --filter @repo/api start"

  worker:
    <<: *app
    image: monorepo-template-app
    container_name: monorepo-template-worker
    restart: unless-stopped
    environment:
      <<: *server-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @repo/worker start

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
